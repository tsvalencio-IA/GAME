<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Gradientes Premium -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#12121a"/>
      <stop offset="100%" stop-color="#050508"/>
    </linearGradient>
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#0066ff"/>
    </linearGradient>
    <linearGradient id="iaGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2ecc71"/>
      <stop offset="100%" stop-color="#00ff88"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fundo Principal -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Silhueta de um Celular em Pé (Referência clara ao uso de Smartphone) -->
  <rect x="136" y="30" width="240" height="452" rx="30" fill="#000000" stroke="url(#primary)" stroke-width="8" opacity="0.8"/>
  
  <!-- Lente da Câmera Frontal do Celular -->
  <circle cx="256" cy="65" r="10" fill="url(#iaGlow)" filter="url(#glow)"/>
  <circle cx="256" cy="65" r="4" fill="#ffffff"/> <!-- Reflexo da Lente -->

  <!-- Miras de Visão Computacional / Câmera AR -->
  <g stroke="url(#iaGlow)" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <!-- Canto Superior Esquerdo -->
    <path d="M 160 140 L 160 110 L 190 110" />
    <!-- Canto Superior Direito -->
    <path d="M 352 140 L 352 110 L 322 110" />
    <!-- Canto Inferior Esquerdo -->
    <path d="M 160 270 L 160 300 L 190 300" />
    <!-- Canto Inferior Direito -->
    <path d="M 352 270 L 352 300 L 322 300" />
  </g>

  <!-- Gamepad Integrado à Visão da Câmera -->
  <path d="M 160 200 C 130 200, 120 240, 140 270 C 160 300, 200 260, 256 260 C 312 260, 352 300, 372 270 C 392 240, 382 200, 352 200 C 322 200, 290 230, 256 230 C 222 230, 190 200, 160 200 Z" fill="#11111a" stroke="url(#primary)" stroke-width="5" filter="url(#glow)"/>
  
  <!-- Direcional D-Pad -->
  <path d="M 185 225 h 10 v -10 h 8 v 10 h 10 v 8 h -10 v 10 h -8 v -10 h -10 z" fill="url(#iaGlow)"/>
  
  <!-- Botões do Controle -->
  <circle cx="325" cy="225" r="7" fill="#ff0055" />
  <circle cx="345" cy="245" r="7" fill="#f1c40f" />

  <!-- Tipografia thIAguinho GAME -->
  <text x="256" y="375" font-family="'Russo One', 'Impact', sans-serif" font-weight="900" font-size="44" fill="#ffffff" text-anchor="middle">th<tspan fill="#00ff88" filter="url(#glow)">IA</tspan>guinho</text>
  
  <text x="256" y="435" font-family="'Chakra Petch', 'Arial', sans-serif" font-weight="900" font-size="46" fill="url(#primary)" text-anchor="middle" letter-spacing="4" filter="url(#glow)">GAME</text>
  <text x="256" y="435" font-family="'Chakra Petch', 'Arial', sans-serif" font-weight="900" font-size="46" fill="#ffffff" text-anchor="middle" letter-spacing="4">GAME</text>
</svg>
