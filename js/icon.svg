svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Gradiente de Fundo Profundo (App Nativa) -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070512"/>
      <stop offset="100%" stop-color="#141028"/>
    </linearGradient>
    
    <!-- Gradiente do Comando (Verde e Azul Cyberpunk) -->
    <linearGradient id="padGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2ecc71"/>
      <stop offset="100%" stop-color="#00f0ff"/>
    </linearGradient>

    <!-- Filtro de Brilho Neon Padrão -->
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Filtro de Brilho Intenso (Para o Olho da IA) -->
    <filter id="neonHeavy" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Fundo Dark Base -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Malha de Rastreamento AR (Realidade Aumentada) -->
  <g stroke="rgba(0, 240, 255, 0.08)" stroke-width="2">
    <line x1="0" y1="205" x2="512" y2="205" />
    <line x1="256" y1="0" x2="256" y2="512" />
    <circle cx="256" cy="205" r="140" fill="none" />
    <circle cx="256" cy="205" r="200" fill="none" />
  </g>

  <!-- Frame da Câmera do Telemóvel (Mira UI) -->
  <g fill="none" stroke="#00f0ff" stroke-width="12" stroke-linecap="round" filter="url(#neon)">
    <path d="M 100 80 L 60 80 L 60 120" />
    <path d="M 412 80 L 452 80 L 452 120" />
    <path d="M 100 450 L 60 450 L 60 410" />
    <path d="M 412 450 L 452 450 L 452 410" />
  </g>

  <!-- Luz Indicadora de Câmera Ativa (REC) -->
  <g filter="url(#neon)">
    <circle cx="220" cy="85" r="8" fill="#ff0055" />
    <text x="240" y="91" font-family="'Chakra Petch', sans-serif" font-weight="700" font-size="20" fill="#ff0055" letter-spacing="2">REC</text>
  </g>

  <!-- SILHUETA DO COMANDO DE VIDEOJOGO (Gamepad Central) -->
  <path d="M 160 130 L 352 130 C 400 130, 432 160, 432 210 C 432 260, 400 280, 372 280 C 340 280, 322 240, 312 220 C 290 240, 270 240, 256 240 C 242 240, 222 240, 200 220 C 190 240, 172 280, 140 280 C 112 280, 80 260, 80 210 C 80 160, 112 130, 160 130 Z" fill="rgba(5, 5, 10, 0.7)" stroke="url(#padGrad)" stroke-width="6" filter="url(#neon)"/>

  <!-- A CÂMERA / OLHO DA INTELIGÊNCIA ARTIFICIAL -->
  <g filter="url(#neon)">
    <!-- Carcaça da Lente -->
    <circle cx="256" cy="205" r="60" fill="#050508" stroke="#00b0f0" stroke-width="6"/>
    <!-- Anel de Foco Automático -->
    <circle cx="256" cy="205" r="45" fill="none" stroke="#2ecc71" stroke-width="3" stroke-dasharray="10 6"/>
    <!-- Vidro da Lente -->
    <circle cx="256" cy="205" r="30" fill="#000" stroke="#00f0ff" stroke-width="2"/>
    <!-- O Núcleo IA (Brilho Verde) -->
    <circle cx="256" cy="205" r="16" fill="#00ff66" filter="url(#neonHeavy)"/>
    <!-- Reflexo no Vidro -->
    <path d="M 235 185 Q 256 170 275 185 Q 256 190 235 185" fill="rgba(255,255,255,0.8)" />
  </g>

  <!-- Botão Direcional do Comando (D-Pad) -->
  <g fill="#00f0ff" filter="url(#neon)">
    <rect x="110" y="200" width="40" height="12" rx="3" />
    <rect x="124" y="186" width="12" height="40" rx="3" />
  </g>

  <!-- Botões de Ação do Comando -->
  <g filter="url(#neon)">
    <circle cx="372" cy="188" r="10" fill="#ff0055" />  <!-- Topo -->
    <circle cx="392" cy="206" r="10" fill="#00ff66" />  <!-- Direita -->
    <circle cx="372" cy="224" r="10" fill="#00f0ff" />  <!-- Fundo -->
    <circle cx="352" cy="206" r="10" fill="#f1c40f" />  <!-- Esquerda -->
  </g>

  <!-- TIPOGRAFIA: thIAguinho GAME -->
  <text x="256" y="375" font-family="'Russo One', sans-serif" font-weight="900" font-size="46" fill="#ffffff" text-anchor="middle" filter="url(#neon)">
    th<tspan fill="#00ff66">IA</tspan>guinho
  </text>
  <text x="256" y="440" font-family="'Chakra Petch', sans-serif" font-weight="700" font-size="44" fill="#00f0ff" text-anchor="middle" letter-spacing="12" filter="url(#neon)">
    GAME
  </text>
</svg>
