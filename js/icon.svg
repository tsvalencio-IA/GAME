<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Gradiente de Fundo Profundo -->
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#16162a"/>
      <stop offset="100%" stop-color="#050508"/>
    </radialGradient>
    
    <!-- Gradiente Neon Principal -->
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#0066ff"/>
    </linearGradient>

    <!-- Efeito de Brilho Neon (Glow) -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fundo Principal -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- HUD de Câmera / AR Periférico (Clean e Profissional) -->
  <g stroke="#ffffff" stroke-width="4" opacity="0.15" fill="none" stroke-linecap="round">
    <path d="M 60 100 L 60 60 L 100 60" />
    <path d="M 452 100 L 452 60 L 412 60" />
    <path d="M 60 412 L 60 452 L 100 452" />
    <path d="M 452 412 L 452 452 L 412 452" />
  </g>

  <!-- Elementos de Interface de Câmera Topo -->
  <circle cx="70" cy="80" r="5" fill="#ff0055" filter="url(#glow)"/>
  <text x="85" y="85" fill="#ff0055" font-family="'Chakra Petch', sans-serif" font-weight="700" font-size="14" letter-spacing="2">REC</text>
  
  <rect x="226" y="65" width="60" height="20" rx="10" fill="none" stroke="#00f0ff" stroke-width="2" opacity="0.4"/>
  <text x="256" y="80" fill="#00f0ff" font-family="'Chakra Petch', sans-serif" font-weight="700" font-size="12" text-anchor="middle" opacity="0.8">00:15</text>

  <!-- ========================================== -->
  <!-- CONSTRUÇÃO DO COMANDO COM LENTE DE IA      -->
  <!-- ========================================== -->
  <g filter="url(#glow)">
    <!-- O corpo geométrico fundido (Comando + Câmera) -->
    <path d="M 200.1 160 L 130 160 A 50 50 0 0 0 130 260 L 200.1 260 A 75 75 0 0 0 311.9 260 L 382 260 A 50 50 0 0 0 382 160 L 311.9 160 A 75 75 0 0 0 200.1 160 Z" 
          fill="#0c0c14" stroke="url(#primary)" stroke-width="6"/>
  </g>

  <!-- Detalhe de "Grip" nos cantos do comando -->
  <path d="M 110 180 Q 95 210 110 240" fill="none" stroke="#00f0ff" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
  <path d="M 402 180 Q 417 210 402 240" fill="none" stroke="#00f0ff" stroke-width="2" opacity="0.3" stroke-linecap="round"/>

  <!-- DIREÇÃO (D-Pad - Lado Esquerdo) -->
  <g transform="translate(160, 210)">
    <rect x="-14" y="-4" width="28" height="8" rx="2" fill="#2ecc71" />
    <rect x="-4" y="-14" width="8" height="28" rx="2" fill="#2ecc71" />
  </g>

  <!-- BOTÕES DE AÇÃO (Lado Direito) -->
  <g transform="translate(352, 210)">
    <circle cx="0" cy="-14" r="5" fill="#ff0055" />
    <circle cx="14" cy="0" r="5" fill="#00f0ff" />
    <circle cx="0" cy="14" r="5" fill="#f1c40f" />
    <circle cx="-14" cy="0" r="5" fill="#00ff88" />
  </g>

  <!-- NÚCLEO DA LENTE (A Inteligência Artificial no centro) -->
  <circle cx="256" cy="210" r="60" fill="#050508" stroke="#00f0ff" stroke-width="2" opacity="0.6"/>
  <circle cx="256" cy="210" r="42" fill="none" stroke="#2ecc71" stroke-width="4" stroke-dasharray="6 8"/>
  <circle cx="256" cy="210" r="28" fill="#000000" stroke="#00f0ff" stroke-width="2"/>
  <circle cx="256" cy="210" r="14" fill="#00ff88" filter="url(#glow)"/> <!-- O "Olho" da IA -->
  <circle cx="260" cy="205" r="4" fill="#ffffff" opacity="0.9"/> <!-- Reflexo do vidro -->

  <!-- ========================================== -->
  <!-- TIPOGRAFIA EXCLUSIVA                       -->
  <!-- ========================================== -->
  <text x="256" y="380" font-family="'Russo One', sans-serif" font-weight="900" font-size="48" fill="#ffffff" text-anchor="middle">th<tspan fill="#00ff88" filter="url(#glow)">IA</tspan>guinho</text>
  <text x="256" y="445" font-family="'Chakra Petch', sans-serif" font-weight="900" font-size="44" fill="#00f0ff" text-anchor="middle" letter-spacing="14" filter="url(#glow)">GAME</text>
  <!-- Camada extra de texto sem brilho para manter a legibilidade do GAME -->
  <text x="256" y="445" font-family="'Chakra Petch', sans-serif" font-weight="900" font-size="44" fill="#ffffff" text-anchor="middle" letter-spacing="14">GAME</text>

</svg>
