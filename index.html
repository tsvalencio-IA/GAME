<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <title>tHIAguinho Console</title>
    
    <!-- Ligações de Instalação PWA e Ícone -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="icon" type="image/svg+xml" href="icon.svg">

    <!-- Bibliotecas Essenciais -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- FIREBASE (App, Auth e Database) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Russo+One&family=Roboto:wght@400;700&display=swap');
        body { margin: 0; overflow: hidden; background-color: #f0f2f5; font-family: 'Roboto', sans-serif; touch-action: none; user-select: none; }
        #game-canvas { display: block; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 10; }
        #webcam { position: absolute; bottom: 20px; right: 20px; width: 160px; height: 120px; border: 2px solid #00b0f0; border-radius: 12px; z-index: 20; object-fit: cover; opacity: 0.2; transform: scaleX(-1); background: #000; box-shadow: 0 10px 25px rgba(0,0,0,0.2); pointer-events: none; }
        
        .ui-layer { position: absolute; top:0; left:0; width: 100%; height: 100%; z-index: 30; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #f8f9fa; }
        .hidden { display: none !important; }
        
        /* Estilos do Loading */
        .spinner { border: 6px solid #e0e0e0; border-top: 6px solid #00b0f0; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Estilos do Menu */
        .glass-panel { background: rgba(255, 255, 255, 0.95); border-radius: 20px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.5); text-align: center; max-width: 90%; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 90%; max-width: 1000px; margin-top: 20px; padding-bottom: 30px;}
        .game-card { background: white; border-radius: 16px; padding: 25px; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border: 2px solid transparent; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 180px; position: relative; overflow: hidden;}
        .game-card:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,176,240,0.2); border-color: #00b0f0; }
        .game-icon { font-size: 3.5rem; margin-bottom: 15px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
        .game-title { font-family: 'Chakra Petch', sans-serif; font-size: 1.4rem; font-weight: 700; color: #2c3e50; text-transform: uppercase; }
        
        /* Cabeçalho */
        .header-bar { position: absolute; top: 0; left: 0; width: 100%; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.05); z-index: 40; box-sizing: border-box; }
        .logo-text { font-family: 'Chakra Petch', sans-serif; font-weight: 700; font-size: 1.8rem; color: #2c3e50; letter-spacing: -0.5px; }
        .logo-os { font-family: 'Russo One', sans-serif; color: #00b0f0; margin-left: 8px; font-size: 1.5rem; }
        .user-info { display: flex; align-items: center; gap: 20px; }
        
        /* Estilos do Admin */
        #admin-screen { background: #0f172a; color: white; overflow-y: auto; padding: 80px 20px 20px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid #1e293b; padding-bottom: 15px;}
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .admin-card { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; }
        .btn-action { padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 0.85rem; width: 100%; margin-top: 10px; border: none;}
        .btn-grant { background: #10b981; color: white; }
        .btn-grant:hover { background: #059669; }
        .btn-revoke { background: #ef4444; color: white; }
        .btn-revoke:hover { background: #dc2626; }
        .btn-gift { background: #f59e0b; color: white; margin-top: 15px; }
        .btn-gift:hover { background: #d97706; }
        .btn-delete { background: transparent; border: 1px solid #ef4444; color: #ef4444; margin-top: 15px; }
        .btn-delete:hover { background: #ef4444; color: white; }
        
        #btn-close-admin { background: #3b82f6; color: white; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; border:none; }
    </style>
</head>
<body>

    <!-- 1. TELA DE CARREGAMENTO -->
    <div id="loading" class="ui-layer">
        <div class="spinner"></div>
        <h1 class="text-4xl font-bold text-gray-800 tracking-wider font-['Chakra_Petch']">tHIAguinho <span class="text-[#00b0f0] font-['Russo_One']">CONSOLE</span></h1>
        <p id="loading-text" class="text-gray-500 mt-4 font-semibold tracking-widest text-sm">CARREGANDO SISTEMA...</p>
    </div>

    <!-- 2. TELA DE AUTENTICAÇÃO -->
    <div id="auth-screen" class="ui-layer hidden" style="background: url('https://www.transparenttextures.com/patterns/cubes.png') #f0f2f5;">
        <div class="glass-panel w-[90%] max-w-md">
            <h2 class="text-3xl font-bold text-gray-800 mb-2 font-['Chakra_Petch']">Identificação de Piloto</h2>
            <p class="text-sm text-gray-500 mb-8">Insira o seu código de acesso ao Console.</p>
            
            <!-- Type=text para permitir a manobra de login do thiago sem teclado barrar -->
            <input type="text" id="auth-email" placeholder="Login do Piloto" class="w-full p-4 mb-4 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#00b0f0] focus:outline-none transition-all text-gray-700 bg-gray-50" autocomplete="off">
            <input type="password" id="auth-pass" placeholder="Senha Secreta" class="w-full p-4 mb-6 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#00b0f0] focus:outline-none transition-all text-gray-700 bg-gray-50">
            
            <button onclick="window.Profile.login()" class="w-full bg-gradient-to-r from-[#00b0f0] to-[#0080ff] text-white font-bold py-4 rounded-xl shadow-lg hover:shadow-xl hover:scale-[1.02] transition-all mb-4 uppercase tracking-widest">
                ENTRAR NO CONSOLE
            </button>
            <button onclick="window.Profile.register()" class="w-full bg-white text-[#00b0f0] border-2 border-[#00b0f0] font-bold py-4 rounded-xl hover:bg-[#f0f9ff] transition-all uppercase tracking-widest">
                NOVO REGISTRO
            </button>
        </div>
    </div>

    <!-- 3. MENU PRINCIPAL -->
    <div id="menu-screen" class="ui-layer hidden relative" style="background: #f0f2f5;">
        <!-- CABEÇALHO SUPERIOR -->
        <div class="header-bar">
            <div class="logo-text">tHIAguinho<span class="logo-os">Console</span></div>
            
            <div class="user-info">
                <div class="flex items-center bg-gray-100 rounded-full px-4 py-2 border border-gray-200">
                    <span class="font-bold text-gray-700 mr-2" id="ui-username">Piloto</span>
                    <span class="bg-[#00b0f0] text-white text-xs font-bold px-2 py-1 rounded-full" id="ui-level">Lvl 1</span>
                </div>
                <div class="flex items-center bg-yellow-50 rounded-full px-4 py-2 border border-yellow-200">
                    <span class="text-yellow-500 mr-2">💰</span>
                    <span class="font-bold text-yellow-600" id="ui-coins">0</span>
                </div>
                <div id="net-status" class="text-xs font-bold text-gray-400">REDE: CONECTANDO...</div>
                
                <!-- BOTÃO INSTALAR PWA -->
                <button id="btn-install-app" class="hidden bg-green-500 text-white font-bold px-4 py-2 rounded-full shadow hover:bg-green-600 transition animate-pulse">
                    📲 INSTALAR APP
                </button>
            </div>
        </div>

        <div id="menu-grid" class="menu-grid mt-24">
            <!-- JOGOS INJETADOS VIA JAVASCRIPT -->
        </div>

        <button id="btn-admin-panel" onclick="window.Admin.init()" class="hidden absolute bottom-6 right-6 bg-red-600 text-white font-bold px-6 py-3 rounded-xl shadow-lg hover:bg-red-700 transition">
            🛠️ PAINEL GESTOR
        </button>
    </div>

    <!-- 4. PAINEL DE ADMINISTRAÇÃO -->
    <div id="admin-screen" class="ui-layer hidden">
        <div class="w-full max-w-6xl mx-auto">
            <div class="admin-header">
                <div>
                    <h1 class="text-3xl font-bold font-['Chakra_Petch'] text-[#00ffcc]">COMANDO CENTRAL DO CONSOLE</h1>
                    <p class="text-gray-400 text-sm mt-1">Gestão de Pilotos e Permissões de Software</p>
                </div>
                <button id="btn-close-admin" onclick="document.getElementById('admin-screen').classList.add('hidden'); document.getElementById('menu-screen').classList.remove('hidden');">VOLTAR AO CONSOLE</button>
            </div>
            <div id="admin-user-list" class="admin-grid"></div>
        </div>
    </div>

    <!-- 5. O MOTOR DO JOGO -->
    <canvas id="game-canvas"></canvas>
    <video id="webcam" autoplay playsinline></video>

    <!-- INICIALIZAÇÃO FIREBASE E SERVICE WORKER PWA -->
    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyDa-11Y90M_N-J1HhK0Xw7YjGg9Q-wTgRw",
          authDomain: "thiaguinhogame-ac91b.firebaseapp.com",
          databaseURL: "https://thiaguinhogame-ac91b-default-rtdb.firebaseio.com",
          projectId: "thiaguinhogame-ac91b",
          storageBucket: "thiaguinhogame-ac91b.firebasestorage.app",
          messagingSenderId: "538097678132",
          appId: "1:538097678132:web:2fe1b850e9c4d1a2da5761"
        };
        try {
            if (typeof firebase !== 'undefined') {
                firebase.initializeApp(firebaseConfig); 
                window.DB = firebase.database();
                window.AuthApp = firebase.auth();
                const statusEl = document.getElementById('net-status');
                if(statusEl) { statusEl.innerHTML = "ONLINE 🟢"; statusEl.style.color = "#2ecc71"; }
            }
        } catch (e) {
            console.error("Firebase Init Error", e);
        }

        // REGISTRO DO SERVICE WORKER (PWA INSTALLER)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    console.log('✅ Console Service Worker Ativado!', reg.scope);
                }).catch(err => {
                    console.error('❌ Falha no Service Worker do Console:', err);
                });
            });
        }

        // Instalação no Telemóvel
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            const installBtn = document.getElementById('btn-install-app');
            if(installBtn) {
                installBtn.classList.remove('hidden');
                installBtn.addEventListener('click', () => {
                    installBtn.classList.add('hidden');
                    deferredPrompt.prompt();
                    deferredPrompt.userChoice.then((choiceResult) => {
                        deferredPrompt = null;
                    });
                });
            }
        });
    </script>

    <!-- CARREGANDO O CORE, ADMIN E OS JOGOS ORIGINAIS INTACTOS -->
    <script src="js/core.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/game_kart.js"></script>
    <script src="js/game_run.js"></script>
    <script src="js/game_box.js"></script>
    <script src="js/game_flight.js"></script>
    <script src="js/game_ar.js"></script>
    <script src="js/game_tennis.js"></script>
</body>
</html>
