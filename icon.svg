<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0f172a"/>
            <stop offset="100%" stop-color="#1e293b"/>
        </linearGradient>
        <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00ffcc"/>
            <stop offset="100%" stop-color="#00bfff"/>
        </linearGradient>
    </defs>
    <!-- Fundo Arredondado do Ícone -->
    <rect width="512" height="512" rx="110" fill="url(#bg)"/>
    
    <!-- Design do Console/Comando -->
    <path d="M110 220 C70 220 50 260 50 330 C50 410 80 430 110 430 C150 430 160 380 200 380 L312 380 C352 380 362 430 402 430 C432 430 462 410 462 330 C462 260 442 220 402 220 Z" fill="url(#primary)" opacity="0.95"/>
    
    <!-- Botões Direcionais (D-Pad) -->
    <path d="M120 280 v40 m-20 -20 h40" stroke="#0f172a" stroke-width="22" stroke-linecap="round"/>
    
    <!-- Botões de Ação -->
    <circle cx="370" cy="310" r="22" fill="#0f172a"/>
    <circle cx="420" cy="270" r="22" fill="#0f172a"/>
    
    <!-- Tipografia tHIAguinho Console -->
    <text x="256" y="155" font-family="'Russo One', Arial, sans-serif" font-weight="900" font-size="78" fill="#ffffff" text-anchor="middle" letter-spacing="1">tHIAguinho</text>
    <text x="256" y="485" font-family="'Chakra Petch', Arial, sans-serif" font-weight="bold" font-size="42" fill="#00ffcc" text-anchor="middle" letter-spacing="6">CONSOLE</text>
</svg>
