<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Gradiente de Fundo Profundo -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050508"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <!-- Gradiente de Tecnologia/IA -->
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2ecc71"/>
      <stop offset="100%" stop-color="#00b0f0"/>
    </linearGradient>
    <!-- Filtro de Brilho -->
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Fundo Dark -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  
  <!-- Frame da Câmera (Realidade Aumentada) -->
  <path d="M 70 150 L 70 70 L 150 70" fill="none" stroke="#2ecc71" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 442 150 L 442 70 L 362 70" fill="none" stroke="#2ecc71" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 70 240 L 70 320 L 150 320" fill="none" stroke="#2ecc71" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 442 240 L 442 320 L 362 320" fill="none" stroke="#2ecc71" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Foco da Câmera e Elementos de IA -->
  <g filter="url(#neon)">
    <!-- Círculo de mira tracejado -->
    <circle cx="256" cy="190" r="90" fill="none" stroke="url(#glow)" stroke-width="8" stroke-dasharray="10 20"/>
    <!-- Lente Interna -->
    <circle cx="256" cy="190" r="50" fill="none" stroke="#00b0f0" stroke-width="4"/>
    <!-- Olho da IA / Gravação -->
    <circle cx="256" cy="190" r="15" fill="#e74c3c"/>
    <!-- Cruz de Foco -->
    <path d="M 256 60 L 256 95 M 256 285 L 256 320 M 125 190 L 160 190 M 352 190 L 387 190" stroke="url(#glow)" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Elemento translúcido de Gamepad no centro -->
  <path d="M 170 250 C 150 250, 140 210, 170 190 C 210 170, 300 170, 342 190 C 372 210, 362 250, 342 250 Z" fill="rgba(0,0,0,0.7)" stroke="#00b0f0" stroke-width="3"/>
  <!-- D-Pad -->
  <path d="M 200 220 h 10 v -10 h 8 v 10 h 10 v 8 h -10 v 10 h -8 v -10 h -10 z" fill="#2ecc71"/>
  <!-- Botões de Ação -->
  <circle cx="295" cy="215" r="7" fill="#f1c40f"/>
  <circle cx="315" cy="230" r="7" fill="#e74c3c"/>

  <!-- Tipografia Exclusiva thIAguinho GAME -->
  <text x="256" y="415" font-family="'Russo One', sans-serif" font-weight="900" font-size="52" fill="#ffffff" text-anchor="middle">th<tspan fill="#2ecc71">IA</tspan>guinho</text>
  <text x="256" y="470" font-family="'Chakra Petch', sans-serif" font-weight="700" font-size="36" fill="#00b0f0" text-anchor="middle" letter-spacing="12">GAME</text>
</svg>
